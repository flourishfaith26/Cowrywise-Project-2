<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cowrywise/login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="background-image" style="background-color: #f4f7fa;">
    <div style="padding: 80px 150px 0px;">
        <div>
            <img src="./Images/Cowry logo.svg" style="margin-bottom: 100px; width: 13%;" alt="">
        </div>

        <div class="main-stretch" style="display: flex;">
            <div style="margin-right: 250px;">
                <h1 style="font-size: 55px; font-weight: 700; color: #0a2e65; font-family: 'Anton', sans-serif;">Jump
                    right in</h1>
                <p style="font-family: 'Anton', sans-serif; font-size: 25px; font-weight: 600; color: #adbacd;">Sign in
                    to continue</p>
                <p style="font-family: 'Anton', sans-serif; color: #687ea1; font-size: 13px;">New user? <span
                        style="font-weight: 600; font-size: 13px; color: #007af6; font-family: 'Anton', sans-serif;"> <a
                            href="signin.html" style="text-decoration: none;"> Create
                            account</a></span></p>
            </div>


            <div style="display: flex; flex-direction: column;">
                <div class="the-form"
                    style="width: 600px; height: 500px; background-color: #ffffff; border: none; box-shadow: 0px 0px 15px rgba(0, 0, 0, 0.1); border-radius: 10px;">
                    <div style="padding: 70px 60px 0px 60px;">
                        <div style="display: flex; gap: 10px;">
                            <button
                                style="background: none; border: 1px solid #e0e4eb; border-radius: 5px; padding: 8px 27px 10px 60px; position: relative;font-family: 'Anton', sans-serif; font-weight: 600; font-size: 15px; color: #0a2e65; ">Sign
                                in with Google <img src="./Images/Google logo.svg"
                                    style="position: absolute; left: 30px;" alt=""></button>
                            <button
                                style="background: none; border: 1px solid #e0e4eb; border-radius: 5px; padding: 8px 27px 10px 60px; position: relative;font-family: 'Anton', sans-serif; font-weight: 600; font-size: 15px; color: #0a2e65; ">Sign
                                in with Google <img src="./Images/Apple logo.svg"
                                    style="position: absolute; left: 30px;" alt=""></button>
                        </div>

                        <p
                            style="font-family: 'Anton', sans-serif; font-size: 13px; padding: 15px; justify-content: center; text-align: center; color: #7184a3;">
                            or</p>

                        <div style="display: flex; flex-direction: column; gap: 30px; margin-bottom: 10px;">
                            <input type="email"
                                style="width: 100%; padding: 15px; font-family: 'Anton', sans-serif; border: 1px solid #e0e4eb; border-radius: 5px;"
                                placeholder="Email Address">
                            <input type="password"
                                style="width: 100%; padding: 15px; font-family: 'Anton', sans-serif; border: 1px solid #e0e4eb; border-radius: 5px;"
                                placeholder="Password">
                        </div>

                        <a href=""
                            style="text-decoration: none; font-family: 'Anton', sans-serif; font-size: 13px; font-weight: 600;">Forgot
                            password?</a>


                    </div>
                    <div style="padding: 30px 60px;">
                        <button
                            style="width: 100%; background: #0066f5; border: none; padding: 10px; color: #fff;  font-size: 17px; font-weight: 600; font-family: 'Anton', sans-serif; border-radius: 5px;">Sign
                            in </button>
                    </div>

                </div>

                <div style="display: flex; justify-content: space-between;">
                    <p style="padding: 20px 0px; font-family: 'Anton', sans-serif; color: #687ea1; font-size: 13px;">
                        Trouble signing in? <span
                            style="font-weight: 600; font-family: 'Anton', sans-serif; font-size: 13px; color: #007af6;">Chat
                            with us</span></p>
                    <p
                        style="padding: 20px 0px; font-family: 'Anton', sans-serif; color: #687ea1; font-size: 12px; font-weight: 600;">
                        Privacy | Terms</p>
                </div>

            </div>

        </div>


    </div>
</body>
<script>
    
</script>

</html>
