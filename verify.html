<script>
    const verifyBtn = document.getElementById("verifyBtn");
    const otpInput = document.getElementById("otp");
    const verifyMessage = document.getElementById("verify-message");
    const emailDisplay = document.getElementById("displayEmail");

    const savedEmail = localStorage.getItem("pendingEmail");

    if (!savedEmail) {
        window.location.href = "signin.html";
    } else {
        emailDisplay.innerHTML = savedEmail;
    }

    const verifyCode = () => {
        const enteredCode = otpInput.value.trim();
        if (enteredCode === "000000") {
            verifyMessage.innerHTML = "";
            verifyBtn.innerHTML = `
    <span class="spinner-border spinner-border-sm"></span> Verifying...
    `;
            verifyBtn.disabled = true;
            setTimeout(() => {
                window.location.href = "createacc.html";
            }, 1500);
        } else {
            verifyMessage.innerHTML = `<p style="color:red; font-size: 12px;">x Invalid verification code. Try '000000'.</p>`;
        }
    };

    const wrongEmailLink = document.getElementById("wrong-email-link");
    const checkMailLink = document.getElementById("check-mail-link");
    const resendLink = document.getElementById("resend-link");

    const wrongEmail = () => {
        // console.log('hey');

        localStorage.removeItem('pendingEmail'); // Clear the backpack
        window.location.href = 'signin.html';    // Go back to sign-in
    };

    const checkEmail = () => {
        console.log('hey');

        event.preventDefault();

        window.location.href = 'mailto:'; // Try to open mail app
    };

    const resendCode = () => {
        // savedEmail is already defined higher up in your script!
        alert(`A new 6-digit code has been sent to ${savedEmail}`);
    };

</script>
