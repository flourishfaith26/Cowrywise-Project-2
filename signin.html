<script type="module">
  // 1. Bring in the Firebase core tools
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
  import {
    getAuth,
    GoogleAuthProvider,
    signInWithPopup
  } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

  // 2. Your project configuration keys
  const firebaseConfig = {
    apiKey: "AIzaSyBCxDO2y_CfmMYF9f-7Pd8-G6NdtzSl4kk",
    authDomain: "level-two-project-22fca.firebaseapp.com",
    projectId: "level-two-project-22fca",
    storageBucket: "level-two-project-22fca.firebasestorage.app",
    messagingSenderId: "541715509294",
    appId: "1:541715509294:web:c4435c791b8546e821efbf"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const googleProvider = new GoogleAuthProvider();

  // ==========================================
  // THE GOOGLE AUTHENTICATION CORE FUNCTION
  // ==========================================
  const signInWithGoogle = () => {
    signInWithPopup(auth, googleProvider)
      .then((result) => {
        const user = result.user;

        const userProfile = {
          firstName: user.displayName ? user.displayName.split(' ')[0] : 'User',
          lastName: user.displayName ? user.displayName.split(' ').slice(1).join(' ') : '',
          name: user.displayName || 'User',
          username: user.email.split('@')[0],
          phone: user.phoneNumber || '',
          email: user.email
        };

        localStorage.setItem('activeUserProfile', JSON.stringify(userProfile));
        localStorage.removeItem('pendingEmail');

        window.location.href = 'dashboard.html';
      })
      .catch((error) => {
        console.error("Google Auth Error:", error);
        alert(`Google Authentication Failed: ${error.message}`);
      });
  };

  window.signInWithGoogle = signInWithGoogle;
</script>

<script>
  const submitInfo = () => {
    const mailInput = document.getElementById('email');
    const messageBox = document.getElementById('message');
    const btn = document.getElementById('btn');

    const emailValue = mailInput.value.trim();

    // 1. Fix: Verify the actual string value instead of the DOM object node
    if (emailValue === '') {
      messageBox.innerHTML = `<p style="color:red; font-size: 12px;">x Please enter your Email Address</p>`;
      return;
    }

    // 2. Save email into the backpack memory stream for createacc.html to catch!
    localStorage.setItem('pendingEmail', emailValue);

    // 3. Render a clean, stylized Bootstrap loading spinner inside the button
    btn.innerHTML = `
      <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
      <span class="ms-2">Loading...</span>
    `;
    btn.disabled = true;

    // 4. Smoothly progress to your next pipeline step
    setTimeout(() => {
      window.location.href = 'verify.html';
    }, 1200);
  };

  window.submitInfo = submitInfo;
</script>
