<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cowrywise/sign-in</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body class="background-image" style="background-color: #f4f7fa;">

  <div style="padding: 80px 170px 0px;">
    <div>
      <img src="./Images/Cowry logo.svg" style="margin-bottom: 100px;" alt="">
    </div>
    <div style="display: flex; gap: 100px;" >
      <div style="display: flex; flex-direction: column;">
        <div style="display: flex; flex-direction: column;">
          <div class="the-form2"
            style="width: 700px; height: 750px; background-color: #ffffff; border: none; box-shadow: 0px 0px 15px rgba(0, 0, 0, 0.1); border-radius: 10px;">
            <div style="padding: 70px 60px 0px 60px;">
              <h1 style="text-align: left; font-size: 70px; font-weight: 600; color: #0a2e65;">Start your
                investment journey</h1>
              <p style="padding: 20px 0px; font-family: 'Anton', sans-serif; color: #687ea1; font-size: 13px;">
                Got an account? <span
                  style="font-weight: 600; font-family: 'Anton', sans-serif; font-size: 13px; color: #007af6;"> <a
                    href="login.html" style="text-decoration: none;">
                    Sign in
                  </a></span></p>


              <div style="display: flex; gap: 10px;">
                <button
                  style="background: none; border: 1px solid #e0e4eb; border-radius: 5px; padding: 8px 27px 10px 60px; position: relative;font-family: 'Anton', sans-serif; font-weight: 600; font-size: 15px; color: #0a2e65; ">Sign
                  in with Google <img src="./Images/Google logo.svg" style="position: absolute; left: 30px;"
                    alt=""></button>
              </div>

              <p
                style="font-family: 'Anton', sans-serif; font-size: 13px; padding: 15px; justify-content: center; text-align: center; color: #7184a3;">
                or</p>

              <div style="display: flex; flex-direction: column; gap: 30px; margin-bottom: 10px;">
                <input type="email"
                  style="width: 100%; padding: 15px; font-family: 'Anton', sans-serif; border: 1px solid #e0e4eb; border-radius: 5px;"
                  placeholder="Email Address" id="email">
              </div>

              <div id="message">

              </div>

            </div>
            <div style="padding: 20px 60px;">
              <button id="btn" onclick="submitInfo()"
                style="width: 100%; background: #0066f5; border: none; padding: 10px; color: #fff;  font-size: 17px; font-weight: 600; font-family: 'Anton', sans-serif; border-radius: 5px;">Continue
              </button>
            </div>

          </div>

          <div class="need-help" style="display: flex; gap: 425px;">
            <p
              style="padding: 20px 0px; font-family: 'Anton', sans-serif; color: #687ea1; font-size: 13px; margin-left: 10px;">
              <img src="./Images/sec (1).png" alt="" style="width: 25px; margin-bottom: 5px;">
              Cowrywise is licensed by the SEC
            </p>
            <p
              style="padding: 20px 0px 50px; font-family: 'Anton', sans-serif; color: #0066f5; font-size: 12px; font-weight: 600;">
              <a href="" style="text-decoration: none;">
                Need Help </a>
            </p>

          </div>

        </div>

      </div>


      <div style="padding-top: 30px;">
        <h1 style="font-size: 30px; font-weight: 700; color: #0a2e65; font-family: 'Anton', sans-serif;">Don’t wait to
          start
        </h1>
        <p style="font-family: 'Anton', sans-serif; color: #7e88a3; width: 300px;">See how much you could have earned in
          the past few years</p>
        <div style="width:210px; height: auto; background-color: #ffffff; border: none;  border-radius: 10px">
          <p
            style="font-family: 'Anton', sans-serif; color: #0066f5; font-size: 13px; font-weight: 600; font-size: 16px;">
            <span style="margin-right: 8px; font-size: 18px;">✨</span>See what you missed >
          </p>
        </div>
      </div>
    </div>

  </div>

</body>
<script>
  const allUsers = JSON.parse(localStorage.getItem('myUsers')) || []
  const mail = document.getElementById('email');


  const submitInfo = () => {
    console.log(mail.value);
    // console.log('hallo');
    if (mail === '') {
      message.innerHTML = `<p style="color:red; font-size: 12px; " class='text-danger'>x Enter your Email</p>`
    } else {
      const userEmail = [mail.value]
      console.log(userEmail);
      const found = allUsers.find(user => user.mail === mail)
      console.log(found);
      if (found) {
        alert('user already exist')
      } else {
        allUsers.push(userEmail)
        localStorage.setItem('myUsers', JSON.stringify(allUsers))
        //   console.log(window.location.href)
        btn.innerHTML = `</button>
                             <button class="btn btn-#212529" type="button" disabled>
                             <span class="spinner-border spinner-border-sm" aria-hidden="true"></span>
                             <span role="status">Loading...</span>
                             </button>`

        setTimeout(() => {
          window.location.href = 'verify.html'
        }, 1500);



      }

    }
  }
</script>

</html>
